name: Sync frontend → saas-analise

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SaaS-Faturas
        uses: actions/checkout@v4

      - name: Push frontend/ para saas-analise
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.SYNC_TOKEN }}
        with:
          source-directory: frontend
          destination-github-username: sergiocordeirorabelo
          destination-repository-name: saas-analise
          target-branch: main
          commit-message: "sync: atualizado via SaaS-Faturas (${{ github.sha }})"
